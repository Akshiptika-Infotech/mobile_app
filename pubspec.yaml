name: mobile_app
description: "A multi-flavor school management Flutter app."
publish_to: 'none'

version: 1.0.3+4

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  dio: ^5.4.3
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  flutter_secure_storage: ^9.2.2
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  url_launcher: ^6.3.0
  cupertino_icons: ^1.0.6
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  mobile_scanner: ^5.0.0
  image_picker: ^1.0.7
  pdf: ^3.11.0
  printing: ^5.12.0
  share_plus: ^9.0.0
  connectivity_plus: ^6.0.0
  cached_network_image: ^3.3.0
  path_provider: ^2.1.0
  flutter_local_notifications: ^17.0.0
  razorpay_flutter: ^1.4.3
  tflite_flutter: ^0.12.1
  google_mlkit_face_detection: ^0.12.0
  camera: ^0.10.5+9
  image: ^4.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/models/
